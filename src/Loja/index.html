<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Shop</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</head>
<body>
    <header class="store-header">
        <a href="../Carrinho/"><img width="50" src="../../public/shopping-cart.png" alt="Carrinho"></a>
        <div>
            <h1>Auto Shop</h1>
            <p>Bem-vindo, <span id="user"></span>! Escolha seu próximo veículo.</p>
        </div>
    </header>

    <section class="account-info">
        <div>
            <span class="label">Último login</span>
            <h5 id="perfil"></h5>
        </div>
        <div>
            <span class="label">Protocolo de acesso</span>
            <p id="idPerfil"></p>
        </div>
    </section>

    <main>
        <h2>Veículos em estoque</h2>
        <div class="wrap">
            <div id="produtos-container" class="center"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
